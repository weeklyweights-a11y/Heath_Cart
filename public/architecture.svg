<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#F1F8E9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1B5E20"/>
    </marker>
    <marker id="arrow-brown" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#5D4037"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1400" height="920" fill="url(#bg)"/>

  <!-- Title -->
  <text x="700" y="42" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#1B5E20" font-weight="bold">HealthCart — System Architecture</text>
  <text x="700" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5D4037">weeklyweights-a11y · healthcart-iota.vercel.app · Intelligence v2 (Phases 0–6)</text>

  <!-- Layer labels -->
  <text x="24" y="108" font-family="Arial, sans-serif" font-size="11" fill="#8D6E63" font-weight="bold">CLIENT</text>
  <text x="24" y="248" font-family="Arial, sans-serif" font-size="11" fill="#8D6E63" font-weight="bold">APPLICATION (VERCEL)</text>
  <text x="24" y="448" font-family="Arial, sans-serif" font-size="11" fill="#8D6E63" font-weight="bold">INTELLIGENCE ENGINE</text>
  <text x="24" y="648" font-family="Arial, sans-serif" font-size="11" fill="#8D6E63" font-weight="bold">DATA &amp; EXTERNAL SERVICES</text>

  <!-- Layer backgrounds -->
  <rect x="20" y="118" width="1360" height="110" rx="10" fill="#FFFFFF" stroke="#C8E6C9" stroke-width="1.5" opacity="0.9"/>
  <rect x="20" y="258" width="1360" height="170" rx="10" fill="#FFFFFF" stroke="#A5D6A7" stroke-width="1.5" opacity="0.9"/>
  <rect x="20" y="458" width="1360" height="170" rx="10" fill="#FFFFFF" stroke="#81C784" stroke-width="1.5" opacity="0.9"/>
  <rect x="20" y="658" width="1360" height="220" rx="10" fill="#FFFFFF" stroke="#66BB6A" stroke-width="1.5" opacity="0.9"/>

  <!-- CLIENT: User -->
  <rect x="40" y="138" width="120" height="70" rx="8" fill="#1B5E20" filter="url(#shadow)"/>
  <text x="100" y="168" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">User</text>
  <text x="100" y="188" text-anchor="middle" fill="#C8E6C9" font-family="Arial, sans-serif" font-size="11">Browser</text>

  <!-- CLIENT: UI pages -->
  <rect x="200" y="128" width="560" height="90" rx="8" fill="#E8F5E9" stroke="#1B5E20" stroke-width="1.5"/>
  <text x="480" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1B5E20" font-weight="bold">React UI (HealthCartContext)</text>
  <text x="480" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5D4037">Shop · Basket · Family Setup · AI Chat Panel</text>
  <text x="480" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8D6E63">Coverage gauge · health badges · score breakdown tooltips</text>

  <!-- CLIENT: api-client -->
  <rect x="820" y="138" width="200" height="70" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="920" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E65100" font-weight="bold">api-client.ts</text>
  <text x="920" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5D4037">fetch / POST JSON</text>

  <line x1="160" y1="173" x2="200" y2="173" stroke="#1B5E20" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="760" y1="173" x2="820" y2="173" stroke="#1B5E20" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- APPLICATION: Next.js -->
  <rect x="40" y="278" width="180" height="130" rx="8" fill="#1B5E20" filter="url(#shadow)"/>
  <text x="130" y="308" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Next.js 14</text>
  <text x="130" y="330" text-anchor="middle" fill="#C8E6C9" font-family="Arial, sans-serif" font-size="11">Hosted on Vercel</text>
  <text x="130" y="355" text-anchor="middle" fill="#A5D6A7" font-family="Arial, sans-serif" font-size="10">SSR + API Routes</text>
  <text x="130" y="375" text-anchor="middle" fill="#A5D6A7" font-family="Arial, sans-serif" font-size="10">Serverless functions</text>
  <text x="130" y="395" text-anchor="middle" fill="#A5D6A7" font-family="Arial, sans-serif" font-size="10">INTELLIGENCE_V2=true</text>

  <!-- API Routes -->
  <rect x="250" y="278" width="720" height="130" rx="8" fill="#F1F8E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="610" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1B5E20" font-weight="bold">REST API Routes (/api/*)</text>
  <text x="280" y="328" font-family="Arial, sans-serif" font-size="11" fill="#33691E">POST /api/chat</text>
  <text x="280" y="348" font-family="Arial, sans-serif" font-size="11" fill="#33691E">POST /api/basket · /add · /adjust</text>
  <text x="280" y="368" font-family="Arial, sans-serif" font-size="11" fill="#33691E">GET  /api/basket/[id]</text>
  <text x="520" y="328" font-family="Arial, sans-serif" font-size="11" fill="#33691E">GET  /api/products · /products/[id]</text>
  <text x="520" y="348" font-family="Arial, sans-serif" font-size="11" fill="#33691E">POST /api/score</text>
  <text x="520" y="368" font-family="Arial, sans-serif" font-size="11" fill="#33691E">CRUD /api/family · /members</text>
  <text x="610" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8D6E63">Zod validation · JSON responses</text>

  <!-- Lib layer -->
  <rect x="1000" y="278" width="360" height="130" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="1180" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1565C0" font-weight="bold">Domain Services (src/lib)</text>
  <text x="1180" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#37474F">scoring.ts · optimizer.ts · family-context.ts</text>
  <text x="1180" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#37474F">context-applier.ts · basket-enrich.ts</text>
  <text x="1180" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#37474F">ai.ts (Gemini client)</text>
  <text x="1180" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8D6E63">Delegates to Intelligence v2 when enabled</text>

  <line x1="920" y1="208" x2="920" y2="258" stroke="#1B5E20" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="970" y1="343" x2="1000" y2="343" stroke="#1565C0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- INTELLIGENCE ENGINE -->
  <rect x="40" y="478" width="200" height="130" rx="8" fill="#4A148C" filter="url(#shadow)"/>
  <text x="140" y="508" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Orchestrator</text>
  <text x="140" y="530" text-anchor="middle" fill="#E1BEE7" font-family="Arial, sans-serif" font-size="10">runChat()</text>
  <text x="140" y="550" text-anchor="middle" fill="#E1BEE7" font-family="Arial, sans-serif" font-size="10">Intent → Score → Basket</text>
  <text x="140" y="570" text-anchor="middle" fill="#E1BEE7" font-family="Arial, sans-serif" font-size="10">→ Format → Log trace</text>
  <text x="140" y="595" text-anchor="middle" fill="#CE93D8" font-family="Arial, sans-serif" font-size="9">Gemini does NOT pick products</text>

  <!-- Pipeline boxes -->
  <rect x="270" y="478" width="150" height="55" rx="6" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="345" y="502" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A148C" font-weight="bold">Intent Agent</text>
  <text x="345" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">Gemini + rules</text>

  <rect x="440" y="478" width="150" height="55" rx="6" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="515" y="502" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A148C" font-weight="bold">Graph Traverse</text>
  <text x="515" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">KgNode / KgEdge BFS</text>

  <rect x="610" y="478" width="150" height="55" rx="6" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="685" y="502" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A148C" font-weight="bold">Hard Filter</text>
  <text x="685" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">Allergies · caps</text>

  <rect x="780" y="478" width="150" height="55" rx="6" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="855" y="502" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A148C" font-weight="bold">Hybrid Score</text>
  <text x="855" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">45/30/15/10 blend</text>

  <rect x="950" y="478" width="150" height="55" rx="6" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="1025" y="502" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A148C" font-weight="bold">Basket CSP</text>
  <text x="1025" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">Category pick + budget</text>

  <rect x="1120" y="478" width="150" height="55" rx="6" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="1195" y="502" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A148C" font-weight="bold">Safety Audit</text>
  <text x="1195" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">Re-check constraints</text>

  <rect x="1290" y="478" width="80" height="55" rx="6" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="1330" y="502" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A148C" font-weight="bold">Format</text>
  <text x="1330" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">Gemini</text>

  <!-- Pipeline arrows -->
  <line x1="240" y1="505" x2="270" y2="505" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="505" x2="440" y2="505" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="505" x2="610" y2="505" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="760" y1="505" x2="780" y2="505" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="930" y1="505" x2="950" y2="505" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1100" y1="505" x2="1120" y2="505" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1270" y1="505" x2="1290" y2="505" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Formula -->
  <rect x="270" y="555" width="1100" height="55" rx="6" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <text x="820" y="578" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A148C">Hybrid score = 45% nutrient cosine + 30% graph match + 15% semantic (intent→tag) + 10% seasonal</text>
  <text x="820" y="598" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8D6E63">Deterministic ranking &amp; basket selection · Gemini used only for intent parsing and reply formatting</text>

  <line x1="1180" y1="408" x2="140" y2="478" stroke="#7B1FA2" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>

  <!-- DATA LAYER -->
  <!-- Prisma -->
  <rect x="40" y="688" width="160" height="90" rx="8" fill="#37474F" filter="url(#shadow)"/>
  <text x="120" y="718" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Prisma ORM</text>
  <text x="120" y="740" text-anchor="middle" fill="#B0BEC5" font-family="Arial, sans-serif" font-size="10">Type-safe queries</text>
  <text x="120" y="758" text-anchor="middle" fill="#B0BEC5" font-family="Arial, sans-serif" font-size="10">Migrations · schema</text>

  <!-- Aurora -->
  <rect x="240" y="678" width="420" height="110" rx="8" fill="#FF9900" stroke="#232F3E" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="708" text-anchor="middle" fill="#232F3E" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Amazon Aurora PostgreSQL</text>
  <text x="450" y="730" text-anchor="middle" fill="#232F3E" font-family="Arial, sans-serif" font-size="11">healthcart-cluster · us-west-2 · DATABASE_URL</text>
  <text x="300" y="755" font-family="Arial, sans-serif" font-size="10" fill="#232F3E">Family · Product · ProductScore</text>
  <text x="300" y="772" font-family="Arial, sans-serif" font-size="10" fill="#232F3E">BasketRecommendation · WeeklyContext</text>
  <text x="560" y="755" font-family="Arial, sans-serif" font-size="10" fill="#232F3E">KgNode · KgEdge · IntelligenceRun</text>
  <text x="560" y="772" font-family="Arial, sans-serif" font-size="10" fill="#232F3E">NutritionLookup · DietaryTagRule</text>

  <!-- Gemini -->
  <rect x="700" y="688" width="200" height="90" rx="8" fill="#4285F4" filter="url(#shadow)"/>
  <text x="800" y="718" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Google Gemini API</text>
  <text x="800" y="740" text-anchor="middle" fill="#E3F2FD" font-family="Arial, sans-serif" font-size="10">GEMINI_API_KEY</text>
  <text x="800" y="758" text-anchor="middle" fill="#E3F2FD" font-family="Arial, sans-serif" font-size="10">Intent extraction · chat formatting</text>

  <!-- Bootstrap data -->
  <rect x="940" y="678" width="420" height="110" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5"/>
  <text x="1150" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#37474F" font-weight="bold">Data Bootstrap (CLI scripts)</text>
  <text x="980" y="735" font-family="Arial, sans-serif" font-size="10" fill="#546E7A">USDA FoodData Central → NutritionLookup</text>
  <text x="980" y="752" font-family="Arial, sans-serif" font-size="10" fill="#546E7A">Health rules → DietaryTagRule → Product.tags</text>
  <text x="980" y="769" font-family="Arial, sans-serif" font-size="10" fill="#546E7A">seed:kg · map:foodon (FoodOn ontology) · seed:all</text>

  <!-- Connection lines -->
  <line x1="820" y1="625" x2="120" y2="688" stroke="#37474F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="460" y="660" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#37474F">read / write via Prisma</text>
  <line x1="120" y1="778" x2="240" y2="733" stroke="#FF9900" stroke-width="2" marker-end="url(#arrow-brown)"/>

  <line x1="345" y1="533" x2="800" y2="688" stroke="#4285F4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="1330" y1="533" x2="850" y2="688" stroke="#4285F4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="620" y="640" font-family="Arial, sans-serif" font-size="10" fill="#1565C0">HTTPS (intent + formatter only)</text>

  <line x1="515" y1="533" x2="450" y2="678" stroke="#FF9900" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-brown)"/>
  <text x="420" y="620" font-family="Arial, sans-serif" font-size="10" fill="#E65100">graph + product data</text>

  <!-- Request flow footer -->
  <rect x="40" y="800" width="1320" height="95" rx="8" fill="#1B5E20" opacity="0.95"/>
  <text x="700" y="828" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">End-to-end request flow (Chat → Basket)</text>
  <text x="80" y="855" fill="#C8E6C9" font-family="Arial, sans-serif" font-size="11">1. User message → POST /api/chat → orchestrator</text>
  <text x="80" y="875" fill="#C8E6C9" font-family="Arial, sans-serif" font-size="11">2. Gemini parses intent → WeeklyContext saved to Aurora → scores invalidated</text>
  <text x="720" y="855" fill="#C8E6C9" font-family="Arial, sans-serif" font-size="11">3. Hybrid scoring ranks all products → CSP builds audited basket</text>
  <text x="720" y="875" fill="#C8E6C9" font-family="Arial, sans-serif" font-size="11">4. Gemini formats reply → Basket + coverage returned to UI</text>
</svg>
